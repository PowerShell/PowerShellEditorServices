variables:
  # Don't download unneeded packages
  - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
    value: 'true'
  # Improve performance by not sending telemetry
  - name: DOTNET_CLI_TELEMETRY_OPTOUT
    value: 'true'

trigger:
  branches:
    include:
      - release/*
  tags:
    include:
    - v*

resources:
  repositories:
  - repository: ComplianceRepo
    type: github
    endpoint: GitHub
    name: PowerShell/compliance
  - repository: vscode-powershell
    type: github
    endpoint: GitHub
    name: PowerShell/vscode-powershell


jobs:
- job: Build
  displayName: Build the release
  pool:
    vmImage: vs2017-win2016
  steps:
  - template: templates/ci-general.yml

- job: Sign
  displayName: Sign the release
  dependsOn: Build
  pool:
    name: 1ES
    demands: ImageOverride -equals MMS2019
  variables:
  - group: ESRP
  steps:
  - template: templates/release-general.yml

- deployment: Publish
  displayName: Publish the release
  dependsOn: Sign
  environment: PowerShellEditorServices
  pool:
    name: 1ES
  variables:
  - group: Publish
  steps:
  - template: templates/publish-general.yml
